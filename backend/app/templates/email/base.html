<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashRoom Compass</title>
</head>
<body style="margin:0;padding:0;background:#f0f2f0;font-family:'Helvetica Neue',Arial,sans-serif;color:#222;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f2f0;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;width:100%;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#1a5c36;padding:28px 36px;">
              <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.3px;">CashRoom Compass</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:3px;">Compass Group · Cash Management &amp; Compliance</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 36px 28px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 36px;background:#f8faf8;border-top:1px solid #eee;font-size:11px;color:#aaa;line-height:1.6;">
              This is an automated notification from CashRoom Compass. Do not reply to this email.<br>
              © Compass Group. All rights reserved.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
